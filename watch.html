<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>워치 타이머</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; color: #ECEEF2;
    font-family: -apple-system, system-ui, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6vw; }

  /* ---- setup screen ---- */
  .row { display: flex; align-items: center; justify-content: center; gap: 3vw; margin: 2.5vh 0; width: 100%; }
  .row .label { font-size: 3.6vw; color: #8A93A3; width: 22vw; text-align: right; flex-shrink: 0; }
  .row .val { font-family: ui-monospace, monospace; font-size: 7vw; font-weight: 700; width: 16vw; text-align: center; }
  .stepBtn {
    width: 11vw; height: 11vw; border-radius: 50%;
    background: #1E222A; border: 1px solid #333944; color: #F5C518;
    font-size: 6vw; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #startBtn {
    margin-top: 3vh; width: 40vw; height: 40vw; border-radius: 50%;
    background: #F5C518; color: #14161A; border: none;
    font-size: 6vw; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }

  /* ---- run screen ---- */
  #runScreen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
  #phaseLabel { font-size: 5vw; letter-spacing: 0.15em; color: #8A93A3; text-transform: uppercase; }
  #bigTime { font-family: ui-monospace, monospace; font-size: 22vw; font-weight: 800; line-height: 1; margin: 1vh 0; }
  #setInfo { font-size: 4.5vw; color: #ECEEF2; }
  #ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .runBtnRow { display: flex; gap: 4vw; margin-top: 3vh; }
  .miniBtn {
    width: 16vw; height: 16vw; border-radius: 50%;
    background: #1E222A; border: 1px solid #333944; color: #ECEEF2;
    font-size: 5vw; display: flex; align-items: center; justify-content: center;
  }

  #doneScreen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; }
  #doneScreen .big { font-size: 10vw; }
  #doneScreen .small { font-size: 4vw; color: #8A93A3; margin-top: 2vh; }
  #doneScreen button {
    margin-top: 3vh; padding: 3vh 6vw; border-radius: 999px;
    background: #262B34; border: 1px solid #333944; color: #ECEEF2; font-size: 4.2vw;
  }
</style>
</head>
<body>
<div id="app">

  <div id="setupScreen">
    <div class="row">
      <div class="label">세트</div>
      <button class="stepBtn" data-step="sets|-1">−</button>
      <div class="val" id="setsVal">3</div>
      <button class="stepBtn" data-step="sets|1">+</button>
    </div>
    <div class="row">
      <div class="label">운동(초)</div>
      <button class="stepBtn" data-step="work|-5">−</button>
      <div class="val" id="workVal">20</div>
      <button class="stepBtn" data-step="work|5">+</button>
    </div>
    <div class="row">
      <div class="label">휴식(초)</div>
      <button class="stepBtn" data-step="rest|-5">−</button>
      <div class="val" id="restVal">45</div>
      <button class="stepBtn" data-step="rest|5">+</button>
    </div>
    <button id="startBtn">▶</button>
  </div>

  <div id="runScreen">
    <div id="phaseLabel">준비</div>
    <div id="bigTime">00:00</div>
    <div id="setInfo">SET 1 / 3</div>
    <div class="runBtnRow">
      <button class="miniBtn" id="skipBtn">⏭</button>
      <button class="miniBtn" id="stopBtn">■</button>
    </div>
  </div>

  <div id="doneScreen">
    <div class="big">🎉</div>
    <div class="small">운동 완료!</div>
    <button id="restartBtn">다시 설정</button>
  </div>

</div>

<script>
  var cfg = { sets: 3, work: 20, rest: 45 };
  try {
    var saved = localStorage.getItem("watch_timer_cfg");
    if (saved) cfg = JSON.parse(saved);
  } catch (e) {}

  var setsValEl = document.getElementById("setsVal");
  var workValEl = document.getElementById("workVal");
  var restValEl = document.getElementById("restVal");

  function renderSetup() {
    setsValEl.textContent = cfg.sets;
    workValEl.textContent = cfg.work;
    restValEl.textContent = cfg.rest;
  }
  renderSetup();

  document.querySelectorAll("[data-step]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var parts = btn.getAttribute("data-step").split("|");
      var key = parts[0];
      var delta = parseInt(parts[1], 10);
      if (key === "sets") cfg.sets = Math.max(1, cfg.sets + delta);
      if (key === "work") cfg.work = Math.max(5, cfg.work + delta);
      if (key === "rest") cfg.rest = Math.max(0, cfg.rest + delta);
      try { localStorage.setItem("watch_timer_cfg", JSON.stringify(cfg)); } catch (e) {}
      renderSetup();
    });
  });

  function vibrate(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
  }

  function fmt(s) {
    var m = Math.floor(s / 60), r = s % 60;
    return (m < 10 ? "0" + m : m) + ":" + (r < 10 ? "0" + r : r);
  }

  var setupScreen = document.getElementById("setupScreen");
  var runScreen = document.getElementById("runScreen");
  var doneScreen = document.getElementById("doneScreen");
  var phaseLabel = document.getElementById("phaseLabel");
  var bigTime = document.getElementById("bigTime");
  var setInfo = document.getElementById("setInfo");

  var state = null; // { setIdx, phase: 'work'|'rest', remaining }
  var handle = null;

  function showScreen(el) {
    [setupScreen, runScreen, doneScreen].forEach(function (s) { s.style.display = "none"; });
    el.style.display = "flex";
  }

  function tick() {
    state.remaining -= 1;
    if (state.remaining < 0) {
      advance();
      return;
    }
    render();
  }

  function render() {
    phaseLabel.textContent = state.phase === "work" ? "운동" : "휴식";
    bigTime.textContent = fmt(state.remaining);
    bigTime.style.color = state.phase === "work" ? "#F5C518" : "#3E8FB0";
    setInfo.textContent = "SET " + (state.setIdx + 1) + " / " + cfg.sets;
  }

  function advance() {
    if (state.phase === "work") {
      vibrate(200);
      if (cfg.rest > 0) {
        state.phase = "rest";
        state.remaining = cfg.rest;
        render();
        return;
      }
      goNextSet();
    } else {
      vibrate([0, 120, 80, 120]);
      goNextSet();
    }
  }

  function goNextSet() {
    if (state.setIdx + 1 < cfg.sets) {
      state.setIdx += 1;
      state.phase = "work";
      state.remaining = cfg.work;
      vibrate(200);
      render();
    } else {
      clearInterval(handle);
      vibrate([0, 150, 100, 150, 100, 300]);
      showScreen(doneScreen);
    }
  }

  document.getElementById("startBtn").addEventListener("click", function () {
    state = { setIdx: 0, phase: "work", remaining: cfg.work };
    showScreen(runScreen);
    render();
    vibrate(200);
    clearInterval(handle);
    handle = setInterval(tick, 1000);
  });

  document.getElementById("skipBtn").addEventListener("click", function () {
    state.remaining = 0;
    advance();
  });

  document.getElementById("stopBtn").addEventListener("click", function () {
    clearInterval(handle);
    showScreen(setupScreen);
  });

  document.getElementById("restartBtn").addEventListener("click", function () {
    showScreen(setupScreen);
  });
</script>
</body>
</html>
